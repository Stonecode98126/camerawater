<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>鑫將數位行銷 — 車牌辨識相機</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, system-ui, sans-serif;
  background: #0a0a0a;
  color: #e5e2e1;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh;
  padding-bottom: 40px;
}

/* ── HEADER ── */
.header {
  width: 100%; max-width: 500px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 14px 8px;
}
.header .brand { font-size: 17px; font-weight: 700; letter-spacing: .06em; color: #ff3322; }
.header .sub   { font-size: 10px; letter-spacing: .14em; color: #555; margin-top: 1px; }
.status-bar {
  width: 100%; max-width: 500px;
  padding: 6px 14px 10px;
  font-size: 12px; color: #888; line-height: 1.5;
  min-height: 38px;
}

/* ── CAMERA FRAME ── */
.cam-wrapper {
  width: 100%; max-width: 500px;
  padding: 0 10px;
  position: relative;
}
#video {
  width: 100%; border-radius: 10px;
  display: block; background: #111;
  aspect-ratio: 4/3; object-fit: cover;
}

/* ── RETICLE OVERLAY ── */
.reticle-overlay {
  position: absolute;
  top: 0; left: 10px; right: 10px; bottom: 0;
  border-radius: 10px;
  pointer-events: none;
  display: flex; align-items: center; justify-content: center;
}
.reticle {
  width: 78%; aspect-ratio: 3/1;
  position: relative;
  border: 1.5px solid rgba(255,51,34,.5);
  border-radius: 5px;
  box-shadow: inset 0 0 20px rgba(255,51,34,.1);
}
.reticle::before, .reticle::after,
.reticle .c1, .reticle .c2 {
  content: ''; position: absolute;
  width: 14px; height: 14px;
  border-color: #ff3322; border-style: solid;
}
.reticle::before { top:-2px; left:-2px;  border-width:3px 0 0 3px; border-radius:3px 0 0 0; }
.reticle::after  { top:-2px; right:-2px; border-width:3px 3px 0 0; border-radius:0 3px 0 0; }
.reticle .c1     { bottom:-2px; left:-2px;  border-width:0 0 3px 3px; border-radius:0 0 0 3px; }
.reticle .c2     { bottom:-2px; right:-2px; border-width:0 3px 3px 0; border-radius:0 0 3px 0; }
.reticle .lbl {
  position: absolute; bottom: 5px; left: 8px;
  font-size: 8px; letter-spacing: .14em; color: rgba(255,51,34,.7);
  font-family: monospace;
}
.scan-line {
  position: absolute; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, #ff3322, transparent);
  top: 0; border-radius: 2px;
  opacity: 0;
}
.scan-line.on { animation: scan 1.6s ease-in-out infinite; }
@keyframes scan {
  0%   { top:0;    opacity:0; }
  8%   { opacity:1; }
  92%  { opacity:1; }
  100% { top:100%; opacity:0; }
}

/* ── PLATE RESULT ── */
.plate-box {
  width: 100%; max-width: 500px;
  padding: 10px 14px;
  display: flex; align-items: center; justify-content: space-between;
}
.plate-result {
  background: #111; border: 1px solid rgba(255,51,34,.3);
  border-radius: 6px; padding: 7px 16px;
  font-family: monospace; font-size: 22px; font-weight: 700;
  letter-spacing: .2em; color: #ff3322;
  min-width: 160px; text-align: center;
  transition: color .3s, border-color .3s;
}
.plate-result.ok  { color: #4ade80; border-color: rgba(74,222,128,.4); }
.plate-result.err { color: #555;    border-color: #222; }
.ocr-steps {
  font-size: 10px; color: #444; font-family: monospace;
  line-height: 1.8; text-align: right;
}
.ocr-steps span.done { color: #4ade80; }
.ocr-steps span.act  { color: #ff3322; }

/* ── DEBUG CANVAS ROW ── */
#debugRow {
  display: none;
  width: 100%; max-width: 500px;
  padding: 6px 10px;
  gap: 5px; flex-direction: column;
}
#debugRow.show { display: flex; }
.debug-item { display: flex; flex-direction: column; gap: 2px; }
.debug-item canvas { width: 100%; border-radius: 3px; border: 1px solid #222; display: block; }
.debug-item .dlbl { font-size: 9px; color: #444; font-family: monospace; }

/* ── CONTROLS ── */
.controls { width: 100%; max-width: 500px; padding: 4px 10px; }
button, .btn-link {
  width: 100%; padding: 16px; margin: 6px 0;
  border: none; border-radius: 10px;
  font-size: 17px; font-weight: 700;
  cursor: pointer; text-decoration: none;
  display: block; text-align: center;
  transition: transform .1s, opacity .1s;
}
button:active, .btn-link:active { transform: scale(.97); opacity: .85; }
.btn-snap   { background: #ff3322; color: white; box-shadow: 0 4px 16px rgba(255,51,34,.4); }
.btn-save   { background: #ff9500; color: white; box-shadow: 0 4px 12px rgba(255,149,0,.35); }
.btn-debug  {
  background: #1a1a1a; color: #555; border: 1px solid #2a2a2a;
  font-size: 13px; padding: 10px;
}
.btn-debug.on { color: #ff3322; border-color: rgba(255,51,34,.4); }

/* ── PREVIEW ── */
#previewSection { display: none; width: 100%; max-width: 500px; padding: 0 10px; margin-top: 8px; }
#previewSection h3 { text-align: center; color: #888; font-size: 13px; margin-bottom: 8px; }
#photo { width: 100%; border-radius: 8px; display: block; }
#fileInfo { font-size: 11px; color: #555; text-align: center; margin-top: 6px; }

/* ── IN-APP BROWSER GUIDE ── */
#guide {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.93); color: white; z-index: 999;
  flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 30px; gap: 16px;
}
#guide .arrow { position: absolute; top: 12px; right: 20px; font-size: 38px; }
#guide h2 { font-size: 22px; }
#guide p  { font-size: 14px; line-height: 1.7; color: #ccc; }

canvas#mainCanvas { display: none; }
</style>
</head>
<body>

<!-- IN-APP BROWSER GUIDE -->
<div id="guide">
  <div class="arrow">↗️</div>
  <h2>請使用 Chrome 開啟</h2>
  <p>偵測到您正在使用應用程式內建瀏覽器（如 LINE / FB）<br>這會導致相機與 GPS 無法運作。</p>
  <p>請點右上角 <b>「···」</b>，選擇 <b>「在瀏覽器中開啟」</b></p>
</div>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="brand">鑫將數位行銷</div>
    <div class="sub">PRECISION OBSERVER · ALPR</div>
  </div>
  <div style="font-size:11px;color:#333;text-align:right">Stonecode</div>
</div>

<!-- STATUS -->
<div id="statusDiv" class="status-bar">正在初始化相機與定位...</div>

<!-- CAMERA -->
<div class="cam-wrapper">
  <video id="video" autoplay playsinline></video>
  <div class="reticle-overlay">
    <div class="reticle" id="reticle">
      <div class="c1"></div><div class="c2"></div>
      <div class="lbl">ALPR ZONE ── 對準車牌</div>
      <div class="scan-line" id="scanLine"></div>
    </div>
  </div>
</div>

<!-- PLATE RESULT -->
<div class="plate-box">
  <div class="plate-result err" id="plateResult">---·----</div>
  <div class="ocr-steps" id="ocrSteps">
    <div>① 灰階　<span id="s1">○</span></div>
    <div>② 二值化<span id="s2">○</span></div>
    <div>③ 邊緣　<span id="s3">○</span></div>
    <div>④ OCR　<span id="s4">○</span></div>
  </div>
</div>

<!-- DEBUG CANVASES -->
<div id="debugRow">
  <div class="debug-item"><div class="dlbl">① 裁切原圖</div><canvas id="dbgCrop"></canvas></div>
  <div class="debug-item"><div class="dlbl">② 灰階</div><canvas id="dbgGray"></canvas></div>
  <div class="debug-item"><div class="dlbl">③ Otsu 二值化</div><canvas id="dbgBin"></canvas></div>
  <div class="debug-item"><div class="dlbl">④ Sobel 邊緣</div><canvas id="dbgEdge"></canvas></div>
  <div class="debug-item"><div class="dlbl">⑤ 送入 OCR（放大）</div><canvas id="dbgOcr"></canvas></div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <button id="snapBtn" class="btn-snap">📸 拍照 + 車牌辨識</button>
  <button id="scanOnlyBtn" class="btn-snap" style="background:#1a1a1a;border:1px solid #333;color:#888;font-size:14px;padding:12px">🔍 僅辨識（不儲存）</button>
  <button id="debugBtn" class="btn-debug">🔬 偵錯面板（顯示前處理步驟）</button>
</div>

<!-- PREVIEW -->
<div id="previewSection">
  <h3>📷 照片預覽</h3>
  <div style="background:#111;border-radius:10px;padding:8px">
    <img id="photo">
    <div id="fileInfo"></div>
  </div>
  <a id="downloadBtn" class="btn-save" download="XinJiang_ALPR.jpg">💾 儲存照片</a>
</div>

<!-- HIDDEN CANVAS -->
<canvas id="mainCanvas"></canvas>

<script>
/* ══════════════════════════════════════════
   DOM refs
══════════════════════════════════════════ */
const video      = document.getElementById('video');
const mainCanvas = document.getElementById('mainCanvas');
const photo      = document.getElementById('photo');
const snapBtn    = document.getElementById('snapBtn');
const scanOnly   = document.getElementById('scanOnlyBtn');
const debugBtn   = document.getElementById('debugBtn');
const downloadBtn= document.getElementById('downloadBtn');
const statusDiv  = document.getElementById('statusDiv');
const fileInfo   = document.getElementById('fileInfo');
const plateResult= document.getElementById('plateResult');
const scanLine   = document.getElementById('scanLine');
const ocrSteps   = document.getElementById('ocrSteps');

/* ══════════════════════════════════════════
   IN-APP BROWSER DETECTION
══════════════════════════════════════════ */
const ua = navigator.userAgent || '';
if (/Line|FBAN|FBAV|Instagram/i.test(ua)) {
  document.getElementById('guide').style.display = 'flex';
}

/* ══════════════════════════════════════════
   GPS
══════════════════════════════════════════ */
let gpsAddr = '定位中...', gpsLatLon = '';
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(async pos => {
    const lat = pos.coords.latitude, lon = pos.coords.longitude;
    gpsLatLon = `GPS: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=zh-TW`);
      const d = await r.json();
      gpsAddr = d.display_name.split(',').slice(0, 4).join(', ');
      statusDiv.textContent = `📍 ${gpsAddr}`;
    } catch(e) {
      gpsAddr = '地址解析失敗';
      statusDiv.textContent = '📍 ' + gpsLatLon;
    }
  }, () => {
    statusDiv.textContent = '❌ 請允許 GPS 定位權限';
  }, { enableHighAccuracy: true });
}

/* ══════════════════════════════════════════
   CAMERA — start immediately (no button gate)
══════════════════════════════════════════ */
navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
  .then(stream => {
    video.srcObject = stream;
    statusDiv.textContent = statusDiv.textContent === '正在初始化相機與定位...'
      ? '相機已就緒，等待定位...'
      : statusDiv.textContent;
  })
  .catch(() => {
    statusDiv.textContent = '❌ 無法取得相機，請確認已授權（需 HTTPS）';
  });

/* ══════════════════════════════════════════
   TESSERACT WORKER — pre-warm
══════════════════════════════════════════ */
let ocrWorker = null, workerReady = false;
(async () => {
  try {
    ocrWorker = await Tesseract.createWorker('eng', 1, { logger: () => {} });
    await ocrWorker.setParameters({
      tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-',
      tessedit_pageseg_mode: '7',
      user_defined_dpi: '150',
    });
    workerReady = true;
  } catch(e) { console.warn('Tesseract init failed:', e); }
})();

/* ══════════════════════════════════════════
   IMAGE PRE-PROCESSING PIPELINE
   ① Grayscale  ② Gaussian blur  ③ Otsu binarize
   ④ Sobel edge ⑤ Dilate        ⑥ Auto-crop
   ⑦ Upscale ≥ 2× for Tesseract
══════════════════════════════════════════ */
function mkCanvas(w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h; return c;
}

/* ① Grayscale */
function toGray(src) {
  const {width: W, height: H} = src;
  const dst = mkCanvas(W, H), ctx = dst.getContext('2d');
  ctx.drawImage(src, 0, 0);
  const id = ctx.getImageData(0, 0, W, H), d = id.data;
  for (let i = 0; i < d.length; i += 4) {
    const g = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
    d[i] = d[i+1] = d[i+2] = g;
  }
  ctx.putImageData(id, 0, 0);
  return dst;
}

/* ② 3×3 Gaussian blur */
function gaussBlur(src) {
  const {width: W, height: H} = src;
  const sd = src.getContext('2d').getImageData(0, 0, W, H).data;
  const dst = mkCanvas(W, H), ctx = dst.getContext('2d');
  const out = ctx.createImageData(W, H), d = out.data;
  const K = [1,2,1,2,4,2,1,2,1];
  for (let y = 1; y < H-1; y++) {
    for (let x = 1; x < W-1; x++) {
      let s = 0, w = 0, ki = 0;
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          s += sd[((y+dy)*W+(x+dx))*4] * K[ki];
          w += K[ki]; ki++;
        }
      }
      const v = s/w, idx = (y*W+x)*4;
      d[idx] = d[idx+1] = d[idx+2] = v; d[idx+3] = 255;
    }
  }
  ctx.putImageData(out, 0, 0);
  return dst;
}

/* ③ Otsu binarize — chars → WHITE (dark bg for Tesseract) */
function otsuBin(src) {
  const {width: W, height: H} = src;
  const sd = src.getContext('2d').getImageData(0, 0, W, H).data;
  const N = W * H;
  const hist = new Float64Array(256);
  for (let i = 0; i < sd.length; i += 4) hist[sd[i]]++;
  for (let i = 0; i < 256; i++) hist[i] /= N;
  let sumAll = 0; for (let i = 0; i < 256; i++) sumAll += i * hist[i];
  let wB = 0, sumB = 0, maxV = 0, T = 128;
  for (let t = 0; t < 256; t++) {
    wB += hist[t]; if (!wB) continue;
    const wF = 1 - wB; if (wF < 1e-9) break;
    sumB += t * hist[t];
    const mB = sumB/wB, mF = (sumAll-sumB)/wF;
    const v = wB * wF * (mB-mF) * (mB-mF);
    if (v > maxV) { maxV = v; T = t; }
  }
  const dst = mkCanvas(W, H), ctx = dst.getContext('2d');
  const out = ctx.createImageData(W, H), d = out.data;
  for (let i = 0; i < sd.length; i += 4) {
    const v = sd[i] > T ? 0 : 255; // invert: dark text → white
    d[i] = d[i+1] = d[i+2] = v; d[i+3] = 255;
  }
  ctx.putImageData(out, 0, 0);
  return dst;
}

/* ④ Sobel edge */
function sobel(src) {
  const {width: W, height: H} = src;
  const sd = src.getContext('2d').getImageData(0, 0, W, H).data;
  const dst = mkCanvas(W, H), ctx = dst.getContext('2d');
  const out = ctx.createImageData(W, H), d = out.data;
  const Kx = [-1,0,1,-2,0,2,-1,0,1], Ky = [-1,-2,-1,0,0,0,1,2,1];
  for (let y = 1; y < H-1; y++) {
    for (let x = 1; x < W-1; x++) {
      let gx = 0, gy = 0, ki = 0;
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          const v = sd[((y+dy)*W+(x+dx))*4];
          gx += Kx[ki]*v; gy += Ky[ki]*v; ki++;
        }
      }
      const g = Math.min(255, Math.sqrt(gx*gx + gy*gy));
      const idx = (y*W+x)*4;
      d[idx] = d[idx+1] = d[idx+2] = g > 60 ? 255 : 0; d[idx+3] = 255;
    }
  }
  ctx.putImageData(out, 0, 0);
  return dst;
}

/* ⑤ Dilate 1px */
function dilate(src) {
  const {width: W, height: H} = src;
  const sd = src.getContext('2d').getImageData(0, 0, W, H).data;
  const dst = mkCanvas(W, H), ctx = dst.getContext('2d');
  const out = ctx.createImageData(W, H), d = out.data;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      let hit = false;
      outer: for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          const ny=y+dy, nx=x+dx;
          if (ny>=0&&ny<H&&nx>=0&&nx<W&&sd[(ny*W+nx)*4]>128){hit=true;break outer;}
        }
      }
      const idx=(y*W+x)*4;
      d[idx]=d[idx+1]=d[idx+2]=hit?255:0; d[idx+3]=255;
    }
  }
  ctx.putImageData(out, 0, 0);
  return dst;
}

/* ⑥ Auto-crop bounding box of white pixels */
function autoCrop(src, pad=6) {
  const {width: W, height: H} = src;
  const d = src.getContext('2d').getImageData(0, 0, W, H).data;
  let x0=W,y0=H,x1=0,y1=0;
  for (let y=0;y<H;y++) for (let x=0;x<W;x++) {
    if (d[(y*W+x)*4]>128) {
      if(x<x0)x0=x; if(x>x1)x1=x; if(y<y0)y0=y; if(y>y1)y1=y;
    }
  }
  if (x1<=x0||y1<=y0) return src;
  x0=Math.max(0,x0-pad); y0=Math.max(0,y0-pad);
  x1=Math.min(W,x1+pad); y1=Math.min(H,y1+pad);
  const out = mkCanvas(x1-x0,y1-y0);
  out.getContext('2d').drawImage(src,x0,y0,x1-x0,y1-y0,0,0,x1-x0,y1-y0);
  return out;
}

/* ⑦ Upscale ≥ 2× */
function upscale(src, minW=640) {
  const scale = Math.max(2, minW/src.width);
  const W2 = Math.round(src.width*scale), H2 = Math.round(src.height*scale);
  const dst = mkCanvas(W2, H2), ctx = dst.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(src, 0, 0, W2, H2);
  return dst;
}

/* ── CROP RETICLE REGION from video ──
   Key fix: use video's own pixel dimensions, map reticle by
   computing its fraction of the *rendered* video element size. */
function cropReticle() {
  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw || !vh) return null;

  // Draw full video frame first
  mainCanvas.width  = vw;
  mainCanvas.height = vh;
  const ctx = mainCanvas.getContext('2d');
  ctx.drawImage(video, 0, 0, vw, vh);

  // The video element is rendered inside .cam-wrapper; it has border-radius
  // but its layout rect gives us the correct displayed size
  const vidRect     = video.getBoundingClientRect();
  const reticleRect = document.getElementById('reticle').getBoundingClientRect();

  // fraction of the displayed video
  const fxL = (reticleRect.left   - vidRect.left)   / vidRect.width;
  const fyT = (reticleRect.top    - vidRect.top)     / vidRect.height;
  const fxR = (reticleRect.right  - vidRect.left)    / vidRect.width;
  const fyB = (reticleRect.bottom - vidRect.top)     / vidRect.height;

  // clamp to [0,1]
  const cx = Math.max(0, fxL) * vw;
  const cy = Math.max(0, fyT) * vh;
  const cw = (Math.min(1, fxR) - Math.max(0, fxL)) * vw;
  const ch = (Math.min(1, fyB) - Math.max(0, fyT)) * vh;

  if (cw < 20 || ch < 10) return null; // safety

  const crop = mkCanvas(Math.round(cw), Math.round(ch));
  crop.getContext('2d').drawImage(mainCanvas, cx, cy, cw, ch, 0, 0, cw, ch);
  return crop;
}

/* ── FULL PIPELINE ── */
async function runPipeline(savePhoto) {
  // Step indicator helpers
  const mark = (id, state) => {
    const el = document.getElementById(id);
    el.className = state === 'done' ? 'done' : state === 'act' ? 'act' : '';
    el.textContent = state === 'done' ? '✓' : state === 'act' ? '▶' : '○';
  };
  ['s1','s2','s3','s4'].forEach(s=>mark(s,''));

  scanLine.classList.add('on');
  plateResult.textContent = '辨識中';
  plateResult.className = 'plate-result';

  // 1. Crop reticle region
  const crop = cropReticle();
  if (!crop) {
    scanLine.classList.remove('on');
    plateResult.textContent = '擷取失敗';
    plateResult.className = 'plate-result err';
    statusDiv.textContent = '⚠ 擷取區域失敗，請確認相機畫面正常';
    return;
  }

  // 2. Gray
  mark('s1','act');
  const gray = toGray(crop);
  mark('s1','done');

  // 3. Blur → Otsu
  mark('s2','act');
  const blur = gaussBlur(gray);
  const bin  = otsuBin(blur);
  mark('s2','done');

  // 4. Sobel → dilate → crop → upscale
  mark('s3','act');
  const edge   = sobel(bin);
  const dil    = dilate(edge);
  const tight  = autoCrop(bin);   // OCR uses binary (cleaner chars)
  const ocrIn  = upscale(tight, 640);
  mark('s3','done');

  // Update debug
  if (document.getElementById('debugRow').classList.contains('show')) {
    drawDebug('dbgCrop', crop);
    drawDebug('dbgGray', gray);
    drawDebug('dbgBin',  bin);
    drawDebug('dbgEdge', edge);
    drawDebug('dbgOcr',  ocrIn);
  }

  // 5. OCR
  mark('s4','act');
  let plate = null;
  try {
    if (!workerReady) throw new Error('OCR worker not ready');
    const {data:{text}} = await ocrWorker.recognize(ocrIn);
    plate = cleanPlate(text);
  } catch(e) {
    console.error('OCR error:', e);
    statusDiv.textContent = '⚠ OCR 失敗：' + e.message;
  }
  mark('s4','done');
  scanLine.classList.remove('on');

  // Show result
  if (plate) {
    plateResult.textContent = plate;
    plateResult.className = 'plate-result ok';
    statusDiv.textContent = '✅ 辨識成功：' + plate;
  } else {
    plateResult.textContent = '未偵測';
    plateResult.className = 'plate-result err';
    statusDiv.textContent = '⚠ 未偵測到車牌，請對準紅框後重試';
  }

  // Save photo with watermark
  if (savePhoto) {
    addWatermark(mainCanvas, plate);
    const MAX_W = 1280;
    let tw = mainCanvas.width, th = mainCanvas.height;
    if (tw > MAX_W) { th = Math.round(th*(MAX_W/tw)); tw = MAX_W; }
    const out = mkCanvas(tw, th);
    out.getContext('2d').drawImage(mainCanvas, 0, 0, tw, th);
    const url = out.toDataURL('image/jpeg', 0.75);
    photo.src = url;
    downloadBtn.href = url;
    const kb = Math.round((url.length * 0.75) / 1024);
    fileInfo.textContent = `[ ${tw}×${th} · 預估 ${kb} KB ]`;
    document.getElementById('previewSection').style.display = 'block';
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }
}

function cleanPlate(raw) {
  const s = raw.replace(/[^A-Z0-9\-]/g,'').trim();
  const pats = [/[A-Z]{3}-?\d{4}/,/[A-Z]{2}-?\d{4}/,/\d{4}-?[A-Z]{3}/,/\d{4}-?[A-Z]{2}/,/[A-Z0-9]{4,8}/];
  for (const p of pats) { const m=s.match(p); if(m) return formatPlate(m[0]); }
  return s.length >= 3 ? formatPlate(s.slice(0,8)) : null;
}
function formatPlate(s) {
  if (s.includes('-')) return s;
  const m = s.match(/^([A-Z]{2,3})(\d{4})$/) || s.match(/^(\d{4})([A-Z]{2,3})$/);
  return m ? m[1]+'-'+m[2] : s;
}

function addWatermark(canvas, plate) {
  const W=canvas.width, H=canvas.height;
  const ctx=canvas.getContext('2d');
  const n=new Date(), p=x=>String(x).padStart(2,'0');
  const ts=`${n.getFullYear()}-${p(n.getMonth()+1)}-${p(n.getDate())} ${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  const base = W * 0.03;
  const gradH = base * 7;
  const gy = H - gradH;
  const grad = ctx.createLinearGradient(0, gy, 0, H);
  grad.addColorStop(0,'transparent'); grad.addColorStop(1,'rgba(0,0,0,0.85)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, gy, W, gradH);
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#ff3322';
  ctx.font = `bold ${base*2}px sans-serif`;
  ctx.fillText('鑫將數位行銷', 20, gy + base*2.8);
  ctx.fillStyle = 'white';
  ctx.font = `bold ${base*1.6}px sans-serif`;
  ctx.fillText(ts, 20, gy + base*4.4);
  ctx.font = `${base*1.1}px sans-serif`;
  const addr = gpsAddr.length > 45 ? gpsAddr.slice(0,45)+'...' : gpsAddr;
  ctx.fillText('📍 ' + addr, 22, gy + base*5.8);
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = `${base*0.95}px monospace`;
  ctx.fillText(gpsLatLon, 22, gy + base*7.0);
  if (plate) {
    ctx.font = `bold ${base*2.2}px monospace`;
    ctx.fillStyle = '#ff3322';
    ctx.textAlign = 'right';
    ctx.fillText(plate, W-20, gy + base*5);
    ctx.textAlign = 'left';
  }
}

function drawDebug(id, src) {
  const c = document.getElementById(id);
  c.width = src.width; c.height = src.height;
  c.getContext('2d').drawImage(src, 0, 0);
}

/* ── BUTTON EVENTS ── */
let processing = false;

snapBtn.addEventListener('click', async () => {
  if (processing) return;
  processing = true;
  snapBtn.disabled = true;
  try { await runPipeline(true); } catch(e){ console.error(e); }
  processing = false;
  snapBtn.disabled = false;
});

scanOnly.addEventListener('click', async () => {
  if (processing) return;
  processing = true;
  scanOnly.disabled = true;
  try { await runPipeline(false); } catch(e){ console.error(e); }
  processing = false;
  scanOnly.disabled = false;
});

debugBtn.addEventListener('click', () => {
  const row = document.getElementById('debugRow');
  const on = row.classList.toggle('show');
  debugBtn.classList.toggle('on', on);
  debugBtn.textContent = on ? '🔬 偵錯面板（隱藏）' : '🔬 偵錯面板（顯示前處理步驟）';
});
