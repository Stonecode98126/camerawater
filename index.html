<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface": "#e5e2e1",
              "secondary-fixed": "#e5e2e1",
              "on-surface-variant": "#ebbbb4",
              "on-tertiary-fixed": "#001a40",
              "tertiary-fixed": "#d7e2ff",
              "surface-container": "#201f1f",
              "inverse-primary": "#c00100",
              "surface-container-highest": "#353534",
              "surface-dim": "#131313",
              "error": "#ffb4ab",
              "on-primary-container": "#5c0000",
              "on-tertiary-container": "#00285b",
              "secondary": "#c8c6c5",
              "inverse-surface": "#e5e2e1",
              "surface-container-high": "#2a2a2a",
              "on-primary-fixed": "#410000",
              "tertiary-fixed-dim": "#acc7ff",
              "surface-tint": "#ffb4a8",
              "on-error-container": "#ffdad6",
              "on-error": "#690005",
              "on-primary-fixed-variant": "#930100",
              "on-secondary": "#303030",
              "on-tertiary-fixed-variant": "#004491",
              "tertiary": "#acc7ff",
              "surface": "#131313",
              "surface-container-low": "#1c1b1b",
              "surface-bright": "#393939",
              "primary-fixed-dim": "#ffb4a8",
              "primary-container": "#ff5540",
              "outline-variant": "#603e39",
              "secondary-fixed-dim": "#c8c6c5",
              "on-background": "#e5e2e1",
              "on-tertiary": "#002f67",
              "on-secondary-fixed": "#1b1c1c",
              "on-secondary-fixed-variant": "#474746",
              "background": "#131313",
              "primary": "#ffb4a8",
              "primary-fixed": "#ffdad4",
              "surface-container-lowest": "#0e0e0e",
              "inverse-on-surface": "#313030",
              "tertiary-container": "#488fff",
              "secondary-container": "#474746",
              "error-container": "#93000a",
              "on-primary": "#690100",
              "on-secondary-container": "#b7b5b4",
              "surface-variant": "#353534",
              "outline": "#b18780"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .capture-frame-glow {
            box-shadow: inset 0 0 15px rgba(255, 85, 64, 0.4), 0 0 10px rgba(255, 85, 64, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body overflow-hidden h-screen w-screen flex flex-col">
<!-- Top Navigation Shell -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 w-full bg-transparent relative">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-red-500" data-icon="sensors">sensors</span>
<span class="font-['Space_Grotesk'] font-bold text-red-500 tracking-widest text-xs">PRECISION OBSERVER</span>
</div>
<div class="absolute left-1/2 -translate-x-1/2 top-1/2 -translate-y-1/2">
<span class="text-primary font-bold text-lg tracking-[0.2em] opacity-90" style="font-family: 'LiSu', 'STLiti', 'KaiTi', 'STKaiti', serif;">
            鑫將數位行銷
        </span>
</div>
<button class="hover:bg-zinc-800/40 transition-colors p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined text-zinc-500" data-icon="settings">settings</span>
</button>
</header>
<!-- Main Viewfinder Canvas -->
<main class="relative flex-1 bg-surface-container-lowest overflow-hidden">
<!-- Mock Camera Feed Background -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-60 grayscale-[0.2]" data-alt="dramatic wide angle shot of an asphalt road in a modern city at twilight with sharp cinematic lighting and deep shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBTCVIE9XkANtswtyGHQIoExtzTEj0aQ8WftUVl-x3PledbOCoz-mxSWYb_DUZBgqtCRQKkByKBkJZVK-Gib7REiQxvXMAHypIzLAgoL2WA8hD8-on6T4tLLgZCO0WxfPlac7JgUrFwVggx0hC6iRtoEzKXMvzouy-mOy8sF_2pNPjRJVWBXK43qk2Sod4cO5WnUGKO7MnrWruQxpAuaKk-wiixoFN_98nBNc11AMB7SdhuAmFB6HZBGb5U-xoY4AsezBrhpZSF29AP"/>
</div>
<!-- HUD: Targeting Reticle -->
<div class="absolute inset-0 z-10 flex flex-col items-center justify-center pointer-events-none">
<div class="w-72 h-40 md:w-96 md:h-56 border-2 border-primary-container capture-frame-glow relative rounded-[2rem]">
<!-- Corner Accents -->
<div class="absolute -top-1 -left-1 w-6 h-6 border-t-4 border-l-4 border-primary"></div>
<div class="absolute -top-1 -right-1 w-6 h-6 border-t-4 border-r-4 border-primary"></div>
<div class="absolute -bottom-1 -left-1 w-6 h-6 border-b-4 border-l-4 border-primary"></div>
<div class="absolute -bottom-1 -right-1 w-6 h-6 border-b-4 border-r-4 border-primary"></div>
<!-- HUD Label -->
<div class="absolute top-2 left-2 bg-primary-container/20 backdrop-blur-md px-2 py-0.5">
<span class="font-headline text-[10px] text-primary uppercase tracking-tighter">ALPR ACTIVE</span>
</div>
<!-- Center Crosshair -->
<div class="absolute inset-0 flex items-center justify-center opacity-30">
<div class="w-px h-8 bg-primary"></div>
<div class="w-8 h-px bg-primary absolute"></div>
</div>
</div>
<!-- Recognition Result Overlay -->
<div class="mt-4 pointer-events-auto">
<div class="bg-surface-container/80 backdrop-blur-md border border-primary/40 px-6 py-2 rounded-lg flex flex-col items-center shadow-lg shadow-black/40">
<span class="font-headline text-[9px] text-primary/80 uppercase tracking-widest mb-0.5">ALPR RECOGNITION</span>
<span class="font-headline text-2xl font-bold text-primary tracking-widest">ABC-1234</span>
</div>
</div>
</div>
<!-- HUD: Watermark & Telemetry -->
<div class="absolute bottom-32 left-6 z-20 space-y-1">
<div class="bg-surface-bright/40 backdrop-blur-xl p-3 rounded-lg border-l-2 border-primary-container">
<div class="flex flex-col gap-0.5">
<span class="font-headline text-lg font-bold text-on-surface leading-tight tracking-tight uppercase">2026-05-20 14:35:12</span>
<div class="flex items-center gap-2 opacity-80">
<span class="material-symbols-outlined text-[14px]" data-icon="location_on">location_on</span>
<span class="font-body text-xs font-medium uppercase tracking-widest">San Francisco, CA</span>
</div>
</div>
<div class="mt-2 flex flex-col gap-1 border-t border-outline-variant/20 pt-2">
<div class="flex items-center gap-2 group">
<a class="flex flex-col hover:text-primary transition-colors" href="https://www.openstreetmap.org/?mlat=37.7749&amp;mlon=-122.4194#map=18/37.7749/-122.4194" target="_blank">
<span class="text-[8px] text-on-surface-variant font-label uppercase">Address</span>
<span class="text-[10px] font-mono flex items-center gap-1">
                            123 Market St, San Francisco, CA
                            <span class="material-symbols-outlined text-[12px] text-primary" data-icon="map">map</span>
</span>
</a>
</div>
<div class="flex flex-col opacity-60">
<span class="text-[8px] text-on-surface-variant font-label uppercase">GPS Reference</span>
<span class="text-[10px] font-mono">37.7749° N, 122.4194° W</span>
</div>
</div>
</div>
</div>
<!-- Floating Controls Over Viewfinder -->
<div class="absolute right-6 top-1/2 -translate-y-1/2 z-20 flex flex-col gap-6">
<button class="w-12 h-12 flex items-center justify-center bg-surface-container/60 backdrop-blur-md rounded-full text-on-surface hover:bg-surface-container-high transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="flash_on">flash_on</span>
</button>
<button class="w-12 h-12 flex items-center justify-center bg-surface-container/60 backdrop-blur-md rounded-full text-on-surface hover:bg-surface-container-high transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="flip_camera_ios">flip_camera_ios</span>
</button>
<button class="w-12 h-12 flex items-center justify-center bg-surface-container/60 backdrop-blur-md rounded-full text-on-surface hover:bg-surface-container-high transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="hdr_on">hdr_on</span>
</button>
</div>
</main>
<!-- Bottom Control Bar -->
<div class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-10 pt-4 bg-zinc-950/80 backdrop-blur-xl shadow-[0_-10px_40px_rgba(0,0,0,0.4)]">
<!-- Archive Link -->
<div class="flex-1 flex justify-start">
<a class="group flex items-center gap-2 px-3 py-2 rounded-md hover:bg-surface-container-high transition-colors" href="#">
<span class="material-symbols-outlined text-zinc-400 group-hover:text-red-400" data-icon="image">image</span>
<span class="hidden md:inline font-['Inter'] font-semibold text-[10px] uppercase text-zinc-400 group-hover:text-red-400">View Saved Assets</span>
</a>
</div>
<!-- Shutter Button Container -->
<div class="flex-none px-12">
<div class="relative group">
<!-- Pulsing outer ring -->
<div class="absolute inset-0 bg-red-600/20 rounded-full animate-ping scale-110 opacity-40"></div>
<button class="relative bg-gradient-to-tr from-red-400 to-red-600 p-6 rounded-full scale-125 -translate-y-2 shadow-lg shadow-red-900/40 active:scale-90 transition-transform">
<div class="w-8 h-8 rounded-full border-4 border-on-primary"></div>
</button>
</div>
</div>
<!-- Mode Switcher -->
<div class="flex-1 flex justify-end">
<button class="flex items-center gap-2 px-3 py-2 rounded-md text-zinc-400 active:scale-95">
<span class="material-symbols-outlined" data-icon="radio_button_checked">radio_button_checked</span>
<span class="hidden md:inline font-['Inter'] font-semibold text-[10px] uppercase">Record</span>
</button>
</div>
</div>
<!-- Screen Interaction Layer (Glass Card Notification Example) -->
<div class="hidden absolute top-20 right-6 z-[60] animate-in fade-in slide-in-from-top-4 duration-500">
<div class="bg-surface-container-high/90 backdrop-blur-2xl p-4 rounded-xl border border-outline-variant/10 shadow-2xl flex items-center gap-4 max-w-xs">
<div class="w-12 h-12 bg-primary-container rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary" data-icon="check_circle">check_circle</span>
</div>
<div>
<p class="font-headline font-bold text-sm tracking-tight">ASSET SAVED</p>
<p class="text-xs text-on-surface-variant font-body">CA License Plate: 7XYZ123</p>
</div>
</div>
</div>
</body></html>
