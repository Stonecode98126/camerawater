<!DOCTYPE html>
<html class="dark" lang="zh-TW">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>鑫將數位行銷 — 車牌辨識</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "bg": "#0a0a0a",
          "surface": "#111111",
          "surface-high": "#1a1a1a",
          "surface-border": "#2a2a2a",
          "primary": "#ff4433",
          "primary-dim": "#ff4433aa",
          "primary-glow": "#ff443322",
          "accent": "#ffb4a8",
          "text": "#e5e2e1",
          "text-dim": "#888",
          "text-muted": "#555",
        },
        fontFamily: {
          "display": ["Space Grotesk", "sans-serif"],
          "mono": ["JetBrains Mono", "monospace"],
          "body": ["Noto Sans TC", "sans-serif"],
        }
      }
    }
  }
</script>

<style>
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #e5e2e1;
    font-family: 'Noto Sans TC', sans-serif;
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0;
  }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    display: inline-block;
    line-height: 1;
    font-size: inherit;
  }

  /* === VIDEO FEED === */
  #videoEl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* mirror front cam */
  }
  #videoEl.rear { transform: scaleX(1); }

  /* === RETICLE === */
  .reticle {
    position: absolute;
    width: min(76vw, 360px);
    aspect-ratio: 2.8 / 1;
    border: 1.5px solid rgba(255, 68, 51, 0.6);
    border-radius: 6px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: inset 0 0 20px rgba(255,68,51,0.15), 0 0 20px rgba(255,68,51,0.1);
  }
  .reticle::before, .reticle::after,
  .reticle .corner-br, .reticle .corner-bl {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    border-color: #ff4433;
    border-style: solid;
  }
  .reticle::before   { top: -2px; left: -2px;  border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .reticle::after    { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
  .reticle .corner-br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
  .reticle .corner-bl { bottom: -2px; left: -2px;  border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }

  /* scan line animation */
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,68,51,0.8), transparent);
    top: 0;
    animation: scan 2s ease-in-out infinite;
    border-radius: 2px;
  }
  @keyframes scan {
    0%   { top: 0%;   opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }

  /* === RESULT PLATE === */
  .plate-display {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: calc(50% - min(76vw, 360px)/2/1 + 8px + 4rem);
    white-space: nowrap;
  }

  /* === TELEMETRY === */
  .telemetry {
    background: rgba(17,17,17,0.75);
    backdrop-filter: blur(16px);
    border-left: 2px solid rgba(255,68,51,0.5);
    padding: 10px 14px;
    border-radius: 4px;
  }

  /* === SHUTTER BUTTON === */
  .shutter-outer {
    width: 72px; height: 72px;
    border: 2px solid rgba(255,68,51,0.5);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .shutter-outer::before {
    content: '';
    position: absolute;
    inset: -4px;
    border: 1px solid rgba(255,68,51,0.2);
    border-radius: 50%;
    animation: pulse-ring 2s ease-out infinite;
  }
  @keyframes pulse-ring {
    0%   { transform: scale(1);   opacity: 0.5; }
    70%  { transform: scale(1.12); opacity: 0; }
    100% { transform: scale(1.12); opacity: 0; }
  }
  .shutter-inner {
    width: 54px; height: 54px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ff6655, #cc2200);
    box-shadow: 0 4px 20px rgba(255,68,51,0.5);
    transition: transform 0.1s, box-shadow 0.1s;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .shutter-inner:active { transform: scale(0.9); box-shadow: 0 2px 10px rgba(255,68,51,0.3); }

  /* === STATUS PILL === */
  .status-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 3px 8px;
    border-radius: 20px;
    background: rgba(255,68,51,0.15);
    border: 1px solid rgba(255,68,51,0.3);
    color: #ff4433;
    display: flex; align-items: center; gap: 4px;
  }
  .status-pill.idle  { background: rgba(100,100,100,0.15); border-color: rgba(100,100,100,0.3); color: #888; }
  .status-pill.ok    { background: rgba(50,200,100,0.15);  border-color: rgba(50,200,100,0.4);  color: #4ade80; }

  .blink { animation: blink 1s step-start infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* === SAVE FLASH === */
  #saveFlash {
    position: fixed; inset: 0; z-index: 200;
    background: white;
    opacity: 0; pointer-events: none;
    transition: opacity 0.08s;
  }

  /* === TOAST === */
  #toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    z-index: 200;
    background: rgba(17,17,17,0.95);
    border: 1px solid rgba(255,68,51,0.4);
    border-radius: 8px;
    padding: 10px 16px;
    font-family: 'JetBrains Mono'; font-size: 11px; letter-spacing: 0.05em;
    color: #ff4433;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
    white-space: nowrap;
    backdrop-filter: blur(20px);
  }

  /* === CAMERA INIT === */
  #initOverlay {
    position: absolute; inset: 0; z-index: 50;
    background: #0a0a0a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
  }
  .init-btn {
    background: #ff4433; color: white;
    border: none; border-radius: 6px;
    padding: 14px 32px;
    font-family: 'Space Grotesk'; font-weight: 700;
    font-size: 14px; letter-spacing: 0.15em;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
  }
  .init-btn:active { transform: scale(0.96); opacity: 0.85; }

  /* No-cam fallback */
  #noCamMsg { display: none; color: #888; font-size: 13px; text-align: center; padding: 0 32px; }

  /* canvas hidden */
  #captureCanvas { display: none; }

  /* Gallery grid */
  #galleryPanel {
    position: fixed; inset: 0; z-index: 150;
    background: rgba(10,10,10,0.97);
    backdrop-filter: blur(20px);
    display: none;
    flex-direction: column;
  }
  #galleryPanel.open { display: flex; }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    padding: 12px;
    overflow-y: auto;
    flex: 1;
  }
  .gallery-item {
    aspect-ratio: 4/3; overflow: hidden; border-radius: 6px;
    border: 1px solid #2a2a2a; cursor: pointer; position: relative;
  }
  .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
  .gallery-item .plate-tag {
    position: absolute; bottom: 4px; left: 4px; right: 4px;
    background: rgba(0,0,0,0.8);
    font-family: 'JetBrains Mono'; font-size: 9px; color: #ff4433;
    padding: 2px 4px; border-radius: 3px; text-align: center;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  }
  .gallery-empty {
    grid-column: 1/-1;
    color: #555; text-align: center;
    font-family: 'JetBrains Mono'; font-size: 12px;
    padding: 60px 0;
  }

  /* OCR processing spinner */
  .ocr-spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,68,51,0.3);
    border-top-color: #ff4433;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body>

<script>
// =============================================
// STATE
// =============================================
let stream = null;
let facingMode = 'environment'; // rear cam
let isOCRRunning = false;
let autoOCRMode = false;
let autoOCRTimer = null;
let savedItems = JSON.parse(localStorage.getItem('cw_saved') || '[]');
let flashTrack = null;

// =============================================
// CLOCK
// =============================================
function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('timeDisplay').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  document.getElementById('dateDisplay').textContent =
    `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())}`;
}
setInterval(updateClock, 1000);
updateClock();

// =============================================
// GPS
// =============================================
let gpsData = { lat: null, lng: null, addr: '定位中...' };
function startGPS() {
  if (!navigator.geolocation) {
    document.getElementById('gpsCoords').textContent = '不支援 GPS';
    return;
  }
  navigator.geolocation.watchPosition(async pos => {
    const { latitude: lat, longitude: lng } = pos.coords;
    gpsData.lat = lat; gpsData.lng = lng;
    document.getElementById('gpsCoords').textContent =
      `${lat.toFixed(5)}° N, ${lng.toFixed(5)}° E`;

    // Reverse geocode
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
      const j = await r.json();
      const addr = j.display_name?.split(',').slice(0,3).join(', ') || '--';
      gpsData.addr = addr;
      document.getElementById('gpsAddr').textContent = addr;
    } catch {}
  }, err => {
    document.getElementById('gpsCoords').textContent = '無法取得位置';
  }, { enableHighAccuracy: true });
}

// =============================================
// CAMERA
// =============================================
async function startCamera() {
  document.getElementById('initOverlay').style.display = 'none';
  startGPS();
  await switchCamera(facingMode);
}

async function switchCamera(facing) {
  if (stream) { stream.getTracks().forEach(t => t.stop()); }
  const video = document.getElementById('videoEl');
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: facing },
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      },
      audio: false
    });
    video.srcObject = stream;
    video.className = facing === 'user' ? '' : 'rear';
    showToast(facing === 'user' ? '前置相機' : '後置相機');

    // Flash track
    flashTrack = stream.getVideoTracks()[0];
  } catch(e) {
    document.getElementById('initOverlay').style.display = 'flex';
    document.getElementById('noCamMsg').style.display = 'block';
    console.error(e);
  }
}

function toggleCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  switchCamera(facingMode);
}

let flashOn = false;
async function toggleFlash() {
  if (!flashTrack) return;
  try {
    flashOn = !flashOn;
    await flashTrack.applyConstraints({ advanced: [{ torch: flashOn }] });
    document.getElementById('flashIcon').textContent = flashOn ? 'flash_off' : 'flash_on';
    document.getElementById('flashBtn').style.color = flashOn ? '#ff4433' : '#aaa';
  } catch(e) {
    showToast('此裝置不支援閃光燈');
    flashOn = false;
  }
}

// =============================================
// CAPTURE + OCR
// =============================================
async function captureAndRecognize(ocrOnly = false) {
  if (isOCRRunning) return;
  const video = document.getElementById('videoEl');
  if (!video.srcObject) { showToast('請先啟動相機'); return; }

  // Flash effect
  const flash = document.getElementById('saveFlash');
  flash.style.opacity = '1';
  setTimeout(() => flash.style.opacity = '0', 80);

  // Draw full frame
  const canvas = document.getElementById('captureCanvas');
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;
  const ctx = canvas.getContext('2d');

  // Mirror if front cam
  if (facingMode === 'user') {
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
  }
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  if (facingMode === 'user') { ctx.setTransform(1,0,0,1,0,0); }

  // Add watermark overlay
  addWatermark(ctx, canvas.width, canvas.height);

  const fullDataUrl = canvas.toDataURL('image/jpeg', 0.92);

  // Crop ALPR zone for OCR
  const areaCanvas = cropALPRZone(video, canvas);

  // Set status
  setStatus('SCANNING', 'active');
  document.getElementById('scanLine').style.display = 'block';
  document.getElementById('ocrSpinner').style.display = 'block';
  isOCRRunning = true;

  let plateText = '---';
  try {
    plateText = await runOCR(areaCanvas);
  } catch(e) {
    console.error(e);
    plateText = 'OCR ERR';
  }

  document.getElementById('scanLine').style.display = 'none';
  document.getElementById('ocrSpinner').style.display = 'none';
  isOCRRunning = false;

  if (plateText && plateText !== '---') {
    document.getElementById('plateText').textContent = plateText;
    setStatus('DETECTED', 'ok');
    showToast(`✓ 偵測到：${plateText}`);
  } else {
    document.getElementById('plateText').textContent = '未偵測';
    setStatus('NO PLATE', 'idle');
    showToast('未偵測到車牌');
  }

  // Save if not ocrOnly-scan-only
  if (!ocrOnly) {
    saveItem(fullDataUrl, plateText);
  }
}

function cropALPRZone(video, fullCanvas) {
  // Get reticle proportions relative to screen
  const reticle = document.getElementById('reticle');
  const rect = reticle.getBoundingClientRect();
  const vRect = document.getElementById('viewfinder').getBoundingClientRect();

  const scaleX = fullCanvas.width / vRect.width;
  const scaleY = fullCanvas.height / vRect.height;

  const x = (rect.left - vRect.left) * scaleX;
  const y = (rect.top - vRect.top) * scaleY;
  const w = rect.width * scaleX;
  const h = rect.height * scaleY;

  const crop = document.createElement('canvas');
  crop.width = w; crop.height = h;
  const ctx = crop.getContext('2d');
  ctx.drawImage(fullCanvas, x, y, w, h, 0, 0, w, h);

  // Pre-process: grayscale + contrast boost for better OCR
  const imgData = ctx.getImageData(0, 0, crop.width, crop.height);
  const d = imgData.data;
  for (let i = 0; i < d.length; i += 4) {
    const gray = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
    // Contrast stretch
    const c = Math.min(255, Math.max(0, (gray - 80) * 2.2));
    d[i] = d[i+1] = d[i+2] = c;
  }
  ctx.putImageData(imgData, 0, 0);
  return crop;
}

function addWatermark(ctx, W, H) {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const timeStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const gps = gpsData.lat ? `${gpsData.lat.toFixed(5)}°N ${gpsData.lng.toFixed(5)}°E` : 'GPS N/A';

  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, H - 70, W, 70);

  ctx.font = `bold ${Math.round(W * 0.018)}px 'Space Grotesk', sans-serif`;
  ctx.fillStyle = '#ff4433';
  ctx.textBaseline = 'middle';
  ctx.fillText('鑫將數位行銷', 16, H - 52);

  ctx.font = `${Math.round(W * 0.014)}px 'JetBrains Mono', monospace`;
  ctx.fillStyle = '#e5e2e1';
  ctx.fillText(timeStr, 16, H - 34);

  ctx.font = `${Math.round(W * 0.012)}px 'JetBrains Mono', monospace`;
  ctx.fillStyle = '#aaa';
  ctx.fillText(gps, 16, H - 16);

  // Plate on right
  const plateTxt = document.getElementById('plateText').textContent;
  if (plateTxt && plateTxt !== '--- ----' && plateTxt !== '未偵測') {
    ctx.font = `bold ${Math.round(W * 0.022)}px 'Space Grotesk', sans-serif`;
    ctx.fillStyle = '#ff4433';
    ctx.textAlign = 'right';
    ctx.fillText(plateTxt, W - 16, H - 36);
  }
  ctx.restore();
}

// =============================================
// OCR via Tesseract.js
// =============================================
async function runOCR(canvas) {
  const worker = await Tesseract.createWorker('eng', 1, {
    logger: () => {}
  });
  await worker.setParameters({
    tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-',
    tessedit_pageseg_mode: '7', // single line
  });
  const { data: { text } } = await worker.recognize(canvas);
  await worker.terminate();

  // Clean up
  const raw = text.replace(/\s+/g, '').toUpperCase();
  // Simple plate pattern filter — letters+digits, 4–8 chars
  const match = raw.match(/[A-Z0-9\-]{4,8}/);
  return match ? match[0] : (raw.length >= 3 ? raw.substring(0,8) : null);
}

// =============================================
// AUTO OCR MODE
// =============================================
function toggleAutoOCR() {
  autoOCRMode = !autoOCRMode;
  const btn = document.getElementById('autoBtn');
  if (autoOCRMode) {
    btn.style.color = '#ff4433';
    btn.style.borderColor = 'rgba(255,68,51,0.5)';
    showToast('自動辨識 ON（每3秒）');
    autoOCRTimer = setInterval(() => captureAndRecognize(true), 3000);
  } else {
    btn.style.color = '#aaa';
    btn.style.borderColor = '#2a2a2a';
    showToast('自動辨識 OFF');
    clearInterval(autoOCRTimer);
  }
}

// =============================================
// SAVE / GALLERY
// =============================================
function saveItem(dataUrl, plate) {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const item = {
    id: Date.now(),
    img: dataUrl,
    plate: plate || '未知',
    ts: `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`,
    gps: gpsData.lat ? `${gpsData.lat.toFixed(5)}, ${gpsData.lng.toFixed(5)}` : null
  };
  savedItems.unshift(item);
  if (savedItems.length > 100) savedItems.pop();
  try { localStorage.setItem('cw_saved', JSON.stringify(savedItems)); } catch(e) {}
  document.getElementById('savedCount').textContent = `${savedItems.length} 張`;
}

function openGallery() {
  document.getElementById('galleryPanel').classList.add('open');
  renderGallery();
}
function closeGallery() {
  document.getElementById('galleryPanel').classList.remove('open');
}
function renderGallery() {
  const grid = document.getElementById('galleryGrid');
  grid.innerHTML = '';
  if (!savedItems.length) {
    grid.innerHTML = '<div class="gallery-empty">尚未儲存任何照片</div>';
    return;
  }
  savedItems.forEach(item => {
    const div = document.createElement('div');
    div.className = 'gallery-item';
    div.innerHTML = `<img src="${item.img}" loading="lazy"/><div class="plate-tag">${item.plate}</div>`;
    div.onclick = () => viewItem(item);
    grid.appendChild(div);
  });
}
function clearGallery() {
  if (!confirm('確定清除全部？')) return;
  savedItems = [];
  localStorage.removeItem('cw_saved');
  document.getElementById('savedCount').textContent = '0 張';
  renderGallery();
}
function viewItem(item) {
  document.getElementById('viewerImg').src = item.img;
  document.getElementById('viewerPlate').textContent = item.plate;
  document.getElementById('viewerMeta').textContent = item.ts + (item.gps ? '  |  GPS ' + item.gps : '');
  document.getElementById('viewerDownload').onclick = () => {
    const a = document.createElement('a');
    a.href = item.img;
    a.download = `plate_${item.plate}_${item.id}.jpg`;
    a.click();
  };
  document.getElementById('imgViewer').style.display = 'flex';
}

// =============================================
// UI HELPERS
// =============================================
function setStatus(text, type) {
  const pill = document.getElementById('statusPill');
  const dot = document.getElementById('statusDot');
  document.getElementById('statusText').textContent = text;
  pill.className = `status-pill ${type}`;
  dot.className = type === 'active' ? 'blink' : '';
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.opacity = '0', 2200);
}

// init saved count
document.getElementById('savedCount').textContent = `${savedItems.length} 張`;
</script>
